name: update

on:
  schedule:
    - cron: "*/30 * * * *"      # 30分ごと
  workflow_dispatch:            # 手動実行も可
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: update
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install httpx feedparser websockets

      - name: Collect
        env:
          AISSTREAM_KEY: ${{ secrets.AISSTREAM_KEY }}
          DEEPL_KEY: ${{ secrets.DEEPL_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python collect.py

      - name: Commit
        run: |
          git config user.name  "hormuz-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/status.json docs/history.json docs/translations.json
          git diff --staged --quiet && echo "変更なし" && exit 0
          git commit -m "status: $(date -u +%FT%TZ)"

          # 実行中に人間が別のコミットをしていても衝突しない。
          # 生成物（status.json 等）はこちらが正なので、rebase して押し込む。
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push origin main && exit 0
            echo "push 失敗。${i}回目のリトライ..."
            sleep 5
          done
          echo "push できませんでした"
          exit 1
